<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; stroke: #e5e5e5; }
      .stroke-main { stroke: #171717; }
      .stroke-accent { stroke: #737373; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0a0a0a; stroke: #262626; }
      .stroke-main { stroke: #fafafa; }
      .stroke-accent { stroke: #A3A3A3; }
    }
    .bg { fill: #0a0a0a; stroke: #262626; }
    .stroke-main { stroke: #fafafa; }
    .stroke-accent { stroke: #A3A3A3; }

    .float-top { animation: floatTop 4s ease-in-out infinite; }
    .float-bottom { animation: floatBottom 4s ease-in-out infinite; }
    @keyframes floatTop {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(0, -0.5px); }
    }
    @keyframes floatBottom {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(0, 0.5px); }
    }
  </style>

  <rect x="1" y="1" width="30" height="30" rx="8" class="bg" stroke-width="1.5" />

  <g transform="translate(0.5, 0)">
    <line x1="9" y1="7.5" x2="9" y2="24.5" class="stroke-main" stroke-width="2.5" stroke-linecap="round" />
    <g class="float-top">
      <path d="M 9.5,8 L 17.5,8 C 20.5,8 22.5,9.5 22.5,12 C 22.5,14.5 20.5,15.5 17.5,15.5 L 9.5,15.5" fill="none" class="stroke-accent" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)" />
    </g>
    <g class="float-bottom">
      <path d="M 9.5,16.5 L 18.5,16.5 C 21.5,16.5 23.5,18 23.5,20.5 C 23.5,23 21.5,24 18.5,24 L 9.5,24" fill="none" class="stroke-main" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)" />
    </g>
  </g>
</svg>
